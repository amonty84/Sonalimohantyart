name: List FTP Directory
on: push

jobs:
  list-ftp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: List FTP Root
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "set ftp:ssl-allow no; open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER; ls -la; echo '---'; cd public_html || echo 'no public_html'; ls -la; echo '---'; cd ../domains/marsysexports.in/public_html || echo 'no addon'; ls -la;" > ftp-log.txt
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ftp-log.txt
          git commit -m "Add ftp log"
          git push
